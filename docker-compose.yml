services:
  db:
    image: postgres:16-alpine
    container_name: projectflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectflow
    ports:
      - '5432:5432'
    volumes:
      - projectflow_pgdata:/var/lib/postgresql/data

volumes:
  projectflow_pgdata:
